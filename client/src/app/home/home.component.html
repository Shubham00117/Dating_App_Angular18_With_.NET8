<div class="container mt-5">
  <div style="text-align: center">
    @if(!registerMode){
    <h1>Find your match</h1>
    <p class="lead">
      Come on in to view your matches... all you need to do is sign up!
    </p>
    <div class="text-center">
      <button (click)="registerToggle()" class="tn btn-primry btn-lg me-2">
        Register
      </button>
      <button class="tn btn-info btn-lg me-2">Lern more</button>
    </div>
    } @else {
    <div clsss="container">
      <div class="row row justify-content-center">
        <div class="col-4">
          <app-register
            (cancelRegister)="cancelRegisterMode($event)"
          ></app-register>
          <!-- this comes from tegister form component-->
        </div>
      </div>
    </div>
    }
  </div>
</div>
